<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>BLACK ARENA TOWER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
/* HUD */
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:rgba(0,0,0,.8);border-bottom:1px solid rgba(255,200,50,.3);flex-shrink:0;height:44px}
#hud .floor{font-size:17px;font-weight:700;color:#FFD700}
#hud .res{display:flex;gap:12px;font-size:13px}
/* 전투 화면 */
#arena{flex:1;position:relative;overflow:hidden;min-height:0}
#bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:filter .3s}
#bg.flash{filter:brightness(2) saturate(2)}
/* 스프라이트 — canvas */
#pet-cv{position:absolute;bottom:145px;left:60px;width:180px;height:180px;object-fit:contain;filter:drop-shadow(0 0 0 transparent)}
#mon-cv{position:absolute;top:70px;right:60px;width:180px;height:180px;object-fit:contain;transform:scaleX(-1)}
/* 히트 쉐이크 */
#mon-cv.hit{animation:mhit .3s}
@keyframes mhit{0%,100%{transform:scaleX(-1) translateX(0)}25%{transform:scaleX(-1) translateX(12px)}75%{transform:scaleX(-1) translateX(-10px)}}
#pet-cv.attack{animation:patk .35s}
@keyframes patk{0%,100%{transform:translateX(0)}40%{transform:translateX(55px)}}
#mon-cv.mon-attack{animation:matk .35s}
@keyframes matk{0%,100%{transform:scaleX(-1) translateX(0)}40%{transform:scaleX(-1) translateX(55px)}}
/* 이펙트 */
#fx{position:absolute;inset:0;pointer-events:none}
.fx-txt{position:absolute;font-size:36px;font-weight:900;animation:frise .8s forwards;pointer-events:none;text-shadow:0 0 16px currentColor}
@keyframes frise{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.9)}}
.dmg{position:absolute;font-size:34px;font-weight:900;animation:frise .9s forwards;pointer-events:none;text-shadow:2px 2px 0 #000}
/* 로그 */
#log{position:absolute;bottom:148px;left:50%;transform:translateX(-50%);width:90%;max-width:540px;text-align:center;pointer-events:none}
.log-line{display:block;font-size:16px;font-weight:700;text-shadow:1px 1px 0 #000;animation:log-fade 2.5s forwards}
@keyframes log-fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
/* 펫 UI */
#pet-ui{position:absolute;bottom:6px;left:10px;width:320px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.13);border-radius:8px;padding:8px 10px}
.pname{font-size:13px;font-weight:700;color:#90FF90;margin-bottom:5px}
.bar-bg{background:#1a1a1a;border-radius:3px;height:13px;position:relative;overflow:hidden;margin:3px 0}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-txt{position:absolute;left:5px;top:0;height:100%;display:flex;align-items:center;font-size:10px;color:#fff;font-weight:700}
.hp-bar{background:linear-gradient(90deg,#22c55e,#4ade80)}
.hp-bar.low{background:linear-gradient(90deg,#dc2626,#ef4444)}
.hp-bar.mid{background:linear-gradient(90deg,#ca8a04,#eab308)}
.mp-bar{background:linear-gradient(90deg,#2563eb,#60a5fa)}
#ult-row{display:flex;gap:2px;margin-top:5px}
.ult-slot{flex:1;height:10px;border-radius:2px;background:#1a1a1a;border:1px solid #555;transition:background .3s}
.ult-slot.on{background:linear-gradient(90deg,#fbbf24,#f59e0b);box-shadow:0 0 5px #fbbf24}
/* 몬스터 UI */
#mon-ui{position:absolute;top:6px;right:10px;width:300px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.13);border-radius:8px;padding:8px 10px;font-size:12px}
.mname{font-size:13px;font-weight:700;color:#FF7070;margin-bottom:5px}
/* 버튼 영역 */
#btns{flex-shrink:0;background:rgba(0,0,0,.88);border-top:1px solid rgba(255,200,50,.2);padding:6px 8px;display:flex;flex-direction:column;gap:4px}
.row{display:flex;gap:4px}
.btn{flex:1;border:none;border-radius:7px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .15s}
.btn:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.2)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn .n{font-size:12px}.btn .c{font-size:10px;opacity:.8}
.atk{background:linear-gradient(135deg,#7f1d1d,#dc2626)}
.atk2{background:linear-gradient(135deg,#1e3a8a,#2563eb)}
.def{background:linear-gradient(135deg,#374151,#6b7280)}
.opp{background:linear-gradient(135deg,#14532d,#16a34a)}
.ult{background:linear-gradient(135deg,#713f12,#d97706);box-shadow:0 0 10px #f59e0b}
.parry-btn{background:linear-gradient(135deg,#7c2d12,#ea580c);animation:pp .6s infinite alternate}
@keyframes pp{from{box-shadow:0 0 5px #ea580c}to{box-shadow:0 0 18px #ea580c,0 0 36px #f97316}}
.swap{background:linear-gradient(135deg,#1e1b4b,#4338ca)}
.pot{background:linear-gradient(135deg,#14532d,#15803d)}
.give{background:linear-gradient(135deg,#1c1c1c,#374151)}
/* 모달 */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center}
#modal.show{display:flex}
#mbox{background:#1a1a2e;border:1px solid rgba(255,200,50,.4);border-radius:12px;padding:18px;min-width:280px;max-width:92vw;max-height:80vh;overflow-y:auto}
#mbox h3{color:#FFD700;margin-bottom:10px;font-size:15px}
.mbtn{display:block;width:100%;margin:5px 0;padding:9px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;cursor:pointer;font-size:13px;text-align:left;transition:background .15s}
.mbtn:hover{background:rgba(255,255,255,.2)}
.mbtn:disabled{opacity:.4;cursor:not-allowed}
.mcancel{background:rgba(255,50,50,.2);border-color:rgba(255,50,50,.4)}
/* 결과 화면 */
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#result.show{display:flex}
#result h2{font-size:32px;font-weight:900}
#result p{font-size:16px;color:#ccc;text-align:center;padding:0 20px}
.rbtn{padding:12px 28px;border-radius:9px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.rbtn:hover{transform:scale(1.04)}
.r-cont{background:linear-gradient(135deg,#15803d,#22c55e);color:#fff}
.r-end{background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:#fff}
/* 모바일 */
@media(max-width:600px){
  #pet-cv{width:120px;height:120px;bottom:120px;left:6px;object-fit:contain}
  #mon-cv{width:120px;height:120px;top:50px;right:6px;object-fit:contain;transform:scaleX(-1)}
  #pet-ui{width:calc(100vw - 16px);left:8px;bottom:4px}
  #mon-ui{width:calc(100vw - 16px);right:8px;top:4px;font-size:11px}
  #hud{padding:4px 8px;height:38px}
  #hud .floor{font-size:14px}
  #hud .res{font-size:10px;gap:7px}
  .btn{font-size:10px;padding:6px 3px}
  .btn .n{font-size:10px}
}
</style>
</head>

<div id="hud">
  <div class="floor">⚔️ BLACK ARENA TOWER | <span id="fl">1</span>층</div>
  <div id="elem-adv" style="font-size:12px;color:#FFD700;font-weight:700"></div>
  <div class="res">
    <span>🪙<span id="bet">-</span>야크</span>
    <span>🍃<span id="slv">0</span></span>
    <span>🌟<span id="gld">0</span></span>

</div>

<div id="arena">

  <img id="mon-cv" width="180" height="180" src="" alt="" style="transform:scaleX(-1);object-fit:contain">

  </div>
  <div id="pet-ui">
    <div class="pname" id="pname">펫</div>

  </div>
</div>

<div id="btns">

  <div class="row">
    <button class="btn ult"      id="b-ult"   onclick="act('ult')"    style="display:none"><span class="n" id="ultn">🌟 ULT</span><span class="c">궁극기</span></button>
    <button class="btn parry-btn"id="b-par"   onclick="act('parry')"  style="display:none"><span class="n">⚡ 패링!</span><span class="c" id="par-r">-%</span></button>

    <button class="btn pot"      id="b-pot"   onclick="openPot()"><span class="n">🧪 포션</span><span class="c" id="potc">0개</span></button>
    <button class="btn give"     id="b-give"  onclick="act('give_up')"><span class="n">🏳️ 포기</span><span class="c"></span></button>
  </div>
</div>

<div id="modal"><div id="mbox"><h3 id="mt">선택</h3><div id="mc"></div><button class="mbtn mcancel" onclick="closeM()">❌ 닫기</button></div></div>

<!-- 바이퍼의 상점 전용 화면 -->
<div id="shop-screen" style="display:none;position:fixed;inset:0;z-index:150;background-size:cover;background-position:center">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.55)"></div>

    <button class="mbtn" style="margin-top:10px;max-width:420px;width:100%" onclick="skipShop()">⏭️ 스킵</button>
  </div>
</div>

<!-- 이벤트 라운드 전용 화면 -->
<div id="event-screen" style="display:none;position:fixed;inset:0;z-index:150;background-size:cover;background-position:center">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.5)"></div>

</div>

<div id="result">

    <button class="rbtn r-end"  id="r-end"  onclick="act('end')">🏆 종료</button>
  </div>
</div>

function getPetUrl(name, atk=false){
  const m=PET_URL[name]; if(!m)return'';
  return atk?m.a:m.i;
}
function getMonUrl(mon, atk=false){
  // 고정 보스
  if(MON_URL[mon.name]){const m=MON_URL[mon.name];return atk?m.a:m.i;}
  const elem=mon.element||'물리';
  // 변종(엘리트)
  if(mon.is_elite){return ELITE_URLS[elem]||ELITE_URLS['물리']||'';}
  // 일반 — 이름 해시로 1~4번 고정
  const pool=ELEM_URLS[elem]||ELEM_URLS['물리'];
  let h=0; for(const c of (mon.name||''))h=(h*31+c.charCodeAt(0))|0;
  return pool[Math.abs(h)%4];
}

function drawPet(cv, name, hpR=1, atk=false){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const p=PP[name]||PP._def;
  const body=hpR<.3?shade(p.b,.7):p.b, acc=hpR<.3?shade(p.a,.7):p.a, eye=hpR<=0?'#f00':p.e;
  const cx=atk?W*.60:W*.50, cy=H*.54, s=Math.min(W,H)*.34;
  // 그림자
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(cx,cy+s*.55,s*.65,s*.14,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // 몸통
  ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(cx,cy,s*.70,s*.58,0,0,Math.PI*2);ctx.fill();
  // 머리
  const hx=cx+s*.28,hy=cy-s*.32,hr=s*.36;
  ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(hx,hy,hr,hr*.90,0,0,Math.PI*2);ctx.fill();
  // 귀
  ctx.fillStyle=acc;
  ctx.beginPath();ctx.ellipse(hx-hr*.50,hy-hr*.85,hr*.22,hr*.38,-.30,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(hx+hr*.50,hy-hr*.85,hr*.22,hr*.38, .30,0,Math.PI*2);ctx.fill();
  // 눈
  ctx.fillStyle=eye;ctx.beginPath();ctx.ellipse(hx-hr*.28,hy-hr*.08,hr*.13,hr*.16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(hx-hr*.24,hy-hr*.13,hr*.05,hr*.06,0,0,Math.PI*2);ctx.fill();
  // 공격 포즈
  if(atk){ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(cx+s*.66,cy-s*.05,s*.22,s*.14,.50,0,Math.PI*2);ctx.fill();}
}

function drawMon(cv, name, elem, hpR=1, boss=false, elite=false){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  const base=mCol(name), body=hpR<.3?shade(base,.7):base;
  const eyeC=boss?'#f00':elite?'#c0f':'#f33';
  const cx=W*.50, cy=H*.50, s=Math.min(W,H)*(boss?.40:elite?.37:.33);
  // 오라
  if(boss||elite){
    const g2=ctx.createRadialGradient(cx,cy,s*.3,cx,cy,s*1.1);
    g2.addColorStop(0,boss?'rgba(255,68,0,.25)':'rgba(170,0,255,.2)');g2.addColorStop(1,'transparent');
    ctx.fillStyle=g2;ctx.beginPath();ctx.ellipse(cx,cy,s*1.1,s*1.1,0,0,Math.PI*2);ctx.fill();
  }
  // 그림자
  ctx.save();ctx.globalAlpha=.22;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(cx,cy+s*.60,s*.68,s*.14,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // 몸통 — 오른쪽 바라봄 (flip)
  ctx.save();ctx.translate(W,0);ctx.scale(-1,1);
  const cx2=W-cx;
  ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(cx2,cy,s*.75,s*.65,0,0,Math.PI*2);ctx.fill();
  // 머리
  const hx=cx2+s*.28,hy=cy-s*.28,hr=s*.38;
  ctx.fillStyle=body;ctx.beginPath();ctx.ellipse(hx,hy,hr,hr*.88,0,0,Math.PI*2);ctx.fill();
  // 뿔
  if(boss){
    ctx.fillStyle='#f80';
    ctx.beginPath();ctx.moveTo(hx-hr*.2,hy-hr*.8);ctx.lineTo(hx-hr*.5,hy-hr*1.6);ctx.lineTo(hx+hr*.1,hy-hr*.8);ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+hr*.3,hy-hr*.7);ctx.lineTo(hx,hy-hr*1.4);ctx.lineTo(hx+hr*.6,hy-hr*.7);ctx.fill();
  }else if(elite){
    ctx.fillStyle='#c4f';
    ctx.beginPath();ctx.moveTo(hx,hy-hr*.9);ctx.lineTo(hx-hr*.3,hy-hr*1.5);ctx.lineTo(hx+hr*.3,hy-hr*1.5);ctx.fill();
  }
  // 눈
  ctx.fillStyle=eyeC;ctx.beginPath();ctx.ellipse(hx+hr*.22,hy-hr*.08,hr*.15,hr*.18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(hx+hr*.27,hy-hr*.12,hr*.05,hr*.06,0,0,Math.PI*2);ctx.fill();
  // 이빨
  ctx.fillStyle=boss?'#f44':elite?'#c4f':shade(base,.55);
  ctx.beginPath();ctx.moveTo(hx+hr*.15,hy+hr*.30);ctx.lineTo(hx+hr*.25,hy+hr*.55);ctx.lineTo(hx+hr*.35,hy+hr*.30);ctx.fill();
  ctx.restore();
  // 상처 (낮은 HP)
  if(hpR<.3&&hpR>0){
    ctx.save();ctx.strokeStyle='#f22';ctx.lineWidth=2;ctx.globalAlpha=.7;
    ctx.beginPath();ctx.moveTo(cx-s*.2,cy-s*.3);ctx.lineTo(cx+s*.1,cy+s*.1);ctx.stroke();ctx.restore();
  }
}

function bar(id, cur, max, label, cls=''){
  const f=document.getElementById(id); const t=document.getElementById(id+'-t');
  if(!f||!t)return;
  const pct=max>0?Math.max(0,Math.min(100,cur/max*100)):0;
  f.style.width=pct+'%'; t.textContent=label;
  f.className='bar-fill '+(id.includes('hp')?('hp-bar'+(pct<30?' low':pct<60?' mid':'')):'mp-bar')+' '+cls;
}

function render(){
  if(!G)return;
  const g=G, pet=g.party[g.active], mon=g.monster;
  if(['result','defeat','ended'].includes(g.phase)){showResult();return;}
  if(g.phase==='shop'){showShop();return;}
  if(g.phase==='event'){document.getElementById('shop-screen').style.display='none';showEvent();return;}
  document.getElementById('result').classList.remove('show');
  document.getElementById('fl').textContent=g.floor;
  document.getElementById('bet').textContent=fmt(g.bet);
  document.getElementById('slv').textContent=g.silver||0;
  document.getElementById('gld').textContent=g.gold||0;
  document.getElementById('wns').textContent=g.wins||0;
  // 배경
  const bk=mon.is_boss?'boss':mon.is_elite?'elite':'normal';
  const bm={normal:'/normal_field.png',boss:'/Boss_field.png',elite:'/normal_field.png'};
  document.getElementById('bg').style.backgroundImage=`url('${BASE}${bm[bk]}')`;
  // 스프라이트 — 실제 이미지
  const petEl=document.getElementById('pet-cv');
  const petUrl=getPetUrl(pet.name,false);
  if(petUrl){petEl.src=petUrl;petEl.onerror=()=>{petEl.src='';};}
  const monEl=document.getElementById('mon-cv');
  const monUrl=getMonUrl(mon,false);
  if(monUrl){monEl.src=monUrl;monEl.onerror=()=>{monEl.src='';};}
  // 속성 상성 표시
  const adv=elemAdv(pet.element,mon.element);
  const pem=ELEM_EM[pet.element]||'';const mem=ELEM_EM[mon.element]||'';
  document.getElementById('elem-adv').textContent=`${pem}${pet.element} vs ${mem}${mon.element} ${adv}`;
  // 펫 UI
  document.getElementById('pname').textContent=`${pet.emoji||'🐾'} ${pet.name} Lv.${pet.level} ${pem}${pet.element}`;
  bar('php', pet.hp, pet.max_hp, `HP ${pet.hp}/${pet.max_hp}`);
  bar('pmp', pet.cur_mana, pet.max_mana, `MP ${pet.cur_mana}/${pet.max_mana}`);
  for(let i=0;i<7;i++) document.getElementById('u'+i).className='ult-slot'+(i<pet.ult_gauge?' on':'');
  // 몬스터 UI
  const mt=mon.is_boss?'👑 BOSS ':mon.is_elite?'⚠️ ELITE ':'';
  const mem2=ELEM_EM[mon.element]||'';
  document.getElementById('mname').textContent=`${mt}${mon.emoji||'👹'} ${mon.name} Lv.${mon.level||0} ${mem2}${mon.element}`;
  bar('mhp', mon.hp, mon.max_hp, `HP ${mon.hp}/${mon.max_hp}`);
  document.getElementById('mdef').style.width=Math.min(100,((mon.def||0)/200)*100)+'%';
  document.getElementById('mdef-t').textContent=`DEF ${mon.def||0}`;
  // 버튼
  renderBtns();
}

function renderBtns(){
  if(!G)return;
  const pet=G.party[G.active];
  const s1=pet.skills?.skill1||{name:'스킬1',mana:10};
  const s2=pet.skills?.skill2||{name:'스킬2',mana:25};
  const ult=pet.skills?.ult;
  document.getElementById('s1n').textContent=`⚔️ ${s1.name}`;
  document.getElementById('s1c').textContent=`${s1.mana}MP`;
  document.getElementById('b-s1').disabled=locked||pet.cur_mana<s1.mana||(pet.skill_cd?.[s1.name]||0)>0;
  document.getElementById('s2n').textContent=`💥 ${s2.name}`;
  document.getElementById('s2c').textContent=`${s2.mana}MP`;
  document.getElementById('b-s2').disabled=locked||pet.cur_mana<s2.mana||(pet.skill_cd?.[s2.name]||0)>0;
  document.getElementById('b-def').disabled=locked;
  document.getElementById('b-opp').disabled=locked;
  const ub=document.getElementById('b-ult');
  ub.style.display=(ult&&pet.ult_gauge>=7)?'flex':'none';
  if(ult) document.getElementById('ultn').textContent=`🌟 ${ult.name}`;
  const pb=document.getElementById('b-par');
  pb.style.display=G.parry_available?'flex':'none';
  if(G.parry_available){
    const sp=pet.speed||60,sm=G.monster.spd||50;
    document.getElementById('par-r').textContent=`${Math.min(65,~~(sp/(sp+sm)*100))}%`;
  }
  const ptot=Object.values(G.potions||{}).reduce((a,b)=>a+b,0);
  document.getElementById('potc').textContent=ptot+'개';
  document.getElementById('b-pot').disabled=ptot===0||locked;
  document.getElementById('b-swp').disabled=locked||!G.party.some((p,i)=>p.alive&&i!==G.active);
  document.getElementById('b-give').disabled=false;  // 포기는 항상 가능
  // 궁극기/패링도 locked 아니면 활성
  const ub2=document.getElementById('b-ult');
  if(ub2.style.display!=='none') ub2.disabled=locked;
  const pb2=document.getElementById('b-par');
  if(pb2.style.display!=='none') pb2.disabled=locked;
}

// ════════════════════════════════════════════════════════
// 액션 실행
// ════════════════════════════════════════════════════════
async function act(action, extra={}){
  if(locked)return;
  locked=true; disableAll(true);
  try{
    // 내 행동 애니
    await animAction(action);
    // API 호출
    const r=await fetch(`${API}/api/game/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,action,extra})});
    if(!r.ok){
      let msg='오류';try{const e=await r.json();msg=e.detail||msg;}catch(_){}
      showLog('⚠️ '+msg); locked=false; disableAll(false); renderBtns(); return;
    }
    const d=await r.json();
    await handleResult(d);
  }catch(e){
    console.error(e); showLog('⚠️ 서버 연결 실패'); locked=false; disableAll(false); renderBtns();
  }
}

async function callAPI(action, extra={}){
  const r=await fetch(`${API}/api/game/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,action,extra})});
  if(!r.ok){let e={detail:'오류'};try{e=await r.json();}catch(_){}throw new Error(e.detail);}
  return await r.json();
}

// ════════════════════════════════════════════════════════
// 결과 처리
// ════════════════════════════════════════════════════════
async function handleResult(d){
  if(!d)return;
  if(d.game_state) G=d.game_state;
  // 로그
  if(d.logs?.length) for(const l of d.logs){if(l?.trim())showLog(l.replace(/\*\*/g,''));await sleep(320);}
  // 내 공격 데미지
  if(d.pet_dmg>0) showDmg(d.pet_dmg, d.pet_crit, false);
  // 몬스터 반격 애니 (딜레이 후)
  if(d.mon_dmg>0) await animMon(d.mon_dmg, d.mon_anim_delay??800);
  // phase별 처리
  if(d.phase==='ended'){
    document.getElementById('rt').textContent=d.reward>0?'🏆 종료!':'🏳️ 포기';
    document.getElementById('rd').textContent=`${d.floor||0}층  ${d.msg||''}`;
    document.getElementById('r-cont').style.display='none';
    document.getElementById('r-end').textContent='✅ 확인';
    document.getElementById('result').classList.add('show');
    locked=false; return;
  }
  if(d.phase==='defeat'){
    document.getElementById('rt').textContent='💀 전멸...';
    document.getElementById('rd').textContent=`${G?.floor||'?'}층에서 쓰러짐. 배팅금 몰수.`;
    document.getElementById('r-cont').style.display='none';
    document.getElementById('r-end').textContent='✅ 확인';
    document.getElementById('result').classList.add('show');
    locked=false; return;
  }
  if(d.phase==='result'){
    document.getElementById('rt').textContent='✅ 처치!';
    document.getElementById('rd').textContent=`${(G?.floor||1)-1}층  승리 ${G?.wins||0}판  예상 보상 ${fmt(d.reward||0)}`;
    document.getElementById('r-cont').style.display='flex';
    document.getElementById('r-end').textContent=`🏆 종료 (+${fmt(d.reward||0)})`;
    document.getElementById('result').classList.add('show');
    locked=false; return;
  }
  if(d.phase==='shop'){
    document.getElementById('result').classList.remove('show');
    document.getElementById('shop-screen').style.display='none';
    showShop(); locked=false; return;
  }
  if(d.phase==='event'){
    document.getElementById('result').classList.remove('show');
    document.getElementById('event-screen').style.display='none';
    showEvent(); locked=false; return;
  }
  // 일반 전투
  document.getElementById('result').classList.remove('show');
  render(); locked=false; renderBtns();
}

// ════════════════════════════════════════════════════════
// 애니메이션
// ════════════════════════════════════════════════════════
const ELEM_FX={불:'🔥',물:'💧',번개:'⚡',풀:'🌿',어둠:'🌑',얼음:'❄️',물리:'⚔️'};
const ELEM_COL={불:'#ef4444',물:'#3b82f6',번개:'#eab308',풀:'#22c55e',어둠:'#8b5cf6',얼음:'#93c5fd',물리:'#9ca3af'};

async function animAction(action){
  const pet=G?.party?.[G?.active]; if(!pet)return;
  if(['skill1','skill2','ult','secret'].includes(action)){
    const cv=document.getElementById('pet-cv');
    cv.classList.add('attack');
    const atkUrl=getPetUrl(pet.name,true);
    if(atkUrl){ await new Promise(res=>{const t=new Image();t.onload=()=>{cv.src=atkUrl;res();};t.onerror=res;t.src=atkUrl;}); }
    showFx(ELEM_FX[pet.element]||'✨', ELEM_COL[pet.element]||'#fff', false);
    await sleep(340);
    const mc=document.getElementById('mon-cv');
    mc.classList.add('hit');
    document.getElementById('bg').classList.add('flash');
    await sleep(280);
    mc.classList.remove('hit');
    document.getElementById('bg').classList.remove('flash');
    cv.classList.remove('attack');
    const idleUrl=getPetUrl(pet.name,false); if(idleUrl) cv.src=idleUrl;
  }else if(action==='parry'){showFxTxt('⚡ 패링!','#f97316');await sleep(180);}
  else if(action==='defend'){showFxTxt('🛡️ 방어!','#60a5fa');await sleep(180);}
  else if(action==='opportunity'){showFxTxt('⚡ 기회!','#a3e635');await sleep(180);}
}

async function animMon(dmg, delayMs=800){
  if(delayMs>0) await sleep(delayMs);
  const mc=document.getElementById('mon-cv');
  mc.classList.add('mon-attack');
  showFxTxt('👹 공격!','#ff6060');
  await sleep(340);
  mc.classList.remove('mon-attack');
  const pc=document.getElementById('pet-cv');
  pc.style.filter='brightness(2) saturate(0)';
  showDmg(dmg,false,true);
  await sleep(280);
  pc.style.filter='';
  const ap=G?.party?.[G?.active];
  if(ap){const u=getPetUrl(ap.name,false);if(u)pc.src=u;}
}

function showFx(icon, color, onMon=true){
  const el=document.createElement('div'); el.className='fx-txt';
  el.textContent=icon; el.style.color=color;
  if(onMon){el.style.right='80px';el.style.top='40%';}
  else{el.style.left='120px';el.style.top='40%';}
  document.getElementById('fx').appendChild(el);
  setTimeout(()=>el.remove(),900);
}
function showFxTxt(txt,color){
  const el=document.createElement('div');el.className='fx-txt';
  el.textContent=txt;el.style.cssText=`color:${color};left:50%;top:38%;transform:translateX(-50%);font-size:26px`;
  document.getElementById('fx').appendChild(el);setTimeout(()=>el.remove(),900);
}
function showDmg(dmg,crit,onPet){
  const el=document.createElement('div');el.className='dmg';
  el.textContent=(crit?'💥':'-')+dmg.toLocaleString();
  el.style.color=crit?'#FFD700':onPet?'#ff4444':'#ff8888';
  if(onPet){el.style.left='14%';el.style.top='52%';}else{el.style.right='14%';el.style.top='18%';}
  document.getElementById('fx').appendChild(el);setTimeout(()=>el.remove(),1000);
}
function showLog(txt){
  const l=document.getElementById('log'),el=document.createElement('span');
  el.className='log-line';el.textContent=txt;l.innerHTML='';l.appendChild(el);
}

// ════════════════════════════════════════════════════════
// 상점 / 이벤트 / 모달
// ════════════════════════════════════════════════════════
function showShop(){
  const items=G?.shop_items||[];
  const ss=document.getElementById('shop-screen');
  // 배경 이미지
  ss.style.backgroundImage=`url('${B}/Viper%20shop.png')`;
  ss.style.display='block';
  // 은잎/금잎
  document.getElementById('shop-res').textContent=`🍃 ${G.silver||0}  🌟 ${G.gold||0}`;
  // 아이템
  document.getElementById('shop-items').innerHTML=
    items.map((item,i)=>{
      const isPotion=item.type==='potion';
      const icon=isPotion?'🧪':'🗡️';
      const lbl=`${icon} ${item.name} — ${item.cost||0}🍃`;
      const dis=(item.cost||0)>(G.silver||0)?'disabled':'';
      const grade=item.grade?` <span style="font-size:10px;opacity:.7">[${item.grade}]</span>`:'';
      return `<button class="mbtn" onclick="buyItem(${i})" ${dis}>${lbl}${grade}</button>`;
    }).join('');
}
async function buyItem(idx){
  closeM();
  document.getElementById('shop-screen').style.display='none';
  try{const d=await callAPI('buy',{idx});await handleResult(d);}
  catch(e){showLog('⚠️ '+e.message);render();}
}
async function skipShop(){
  closeM();
  document.getElementById('shop-screen').style.display='none';
  try{const d=await callAPI('skip_shop');await handleResult(d);}
  catch(e){showLog('⚠️ '+e.message);render();}
}

function showEvent(){
  const evt=G?.current_event||{};
  const es=document.getElementById('event-screen');
  const bgUrl=EVT_BG[evt.name]||'';
  es.style.backgroundImage=bgUrl?`url('${bgUrl}')`:'none';
  es.style.background=bgUrl?'':'linear-gradient(135deg,#1a0a2e,#0a1a2e)';
  document.getElementById('evt-name').textContent=`${evt.emoji||'✨'} ${evt.name||'이벤트'}`;
  document.getElementById('evt-desc').textContent=evt.desc||'';
  es.style.display='block';
}
async function acceptEvent(){
  closeM();
  document.getElementById('event-screen').style.display='none';
  try{const d=await callAPI('event_accept');await handleResult(d);}
  catch(e){showLog('⚠️ '+e.message);render();}
}

function showResult(){
  const g=G;
  if(g.phase==='defeat'){
    document.getElementById('rt').textContent='💀 전멸...';
    document.getElementById('rd').textContent=`${g.floor}층에서 쓰러짐`;
    document.getElementById('r-cont').style.display='none';
  }else{
    document.getElementById('rt').textContent='✅ 처치!';
    document.getElementById('rd').textContent=`${g.floor-1}층  승리 ${g.wins}판`;
    document.getElementById('r-cont').style.display='flex';
  }
  document.getElementById('result').classList.add('show');
}

function openPot(){
  const pots=Object.entries(G.potions||{}).filter(([,v])=>v>0);
  if(!pots.length)return;
  document.getElementById('mt').textContent='🧪 포션 선택';
  document.getElementById('mc').innerHTML=
    pots.map(([n,q])=>`<button class="mbtn" onclick="usePot('${n}')">${n} ×${q}</button>`).join('');
  document.getElementById('modal').classList.add('show');
}
function usePot(n){closeM();act('potion',{potion_name:n});}

function openSwap(){
  const others=G.party.filter((p,i)=>p.alive&&i!==G.active);
  if(!others.length)return;
  document.getElementById('mt').textContent='🔄 펫 교체';
  document.getElementById('mc').innerHTML=
    G.party.map((p,i)=>p.alive&&i!==G.active?`<button class="mbtn" onclick="swapTo(${i})">${p.emoji||'🐾'} ${p.name} Lv.${p.level}  HP:${p.hp}/${p.max_hp}</button>`:'').join('');
  document.getElementById('modal').classList.add('show');
}
function swapTo(i){closeM();act('swap',{swap_idx:i});}
function closeM(){document.getElementById('modal').classList.remove('show');}

// ════════════════════════════════════════════════════════
// 유틸
// ════════════════════════════════════════════════════════
function fmt(n){if(!n)return'0';if(n>=100000000)return(n/1e8).toFixed(1)+'억야크';if(n>=10000)return~~(n/10000)+'만야크';return n.toLocaleString()+'야크';}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function disableAll(v){
  document.querySelectorAll('.btn').forEach(b=>{
    if(b.id==='b-give') return;  // 포기는 항상 활성
    b.disabled=v;
  });
}
function err(msg){document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;font-size:17px;color:#f66;padding:20px">${msg}</div>`;}

// ════════════════════════════════════════════════════════
// 시작
// ════════════════════════════════════════════════════════
(async()=>{
  try{
    const r=await fetch(`${API}/api/game/state?token=${token}`);
    if(!r.ok){err('게임 세션이 없습니다.<br>Discord에서 <b>/블레나 시작</b> 을 먼저 하세요.');return;}
    G=await r.json();
    render();
  }catch(e){
    err('서버에 연결할 수 없습니다.<br>잠시 후 다시 시도하세요.<br><small>'+e.message+'</small>');
  }
})();
</script>
