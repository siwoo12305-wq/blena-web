<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK ARENA TOWER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:#fff; font-family:'Noto Sans KR',sans-serif; overflow:hidden; }
#game-container { width:100vw; height:100vh; display:flex; flex-direction:column; }

/* 상단 HUD */
#hud {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 20px; background:rgba(0,0,0,0.7);
    border-bottom:1px solid rgba(255,200,50,0.3);
    height:48px; flex-shrink:0;
}
#hud .floor { font-size:20px; font-weight:bold; color:#FFD700; }
#hud .resources { display:flex; gap:16px; font-size:14px; }
#hud .elem-info { font-size:13px; color:#FFD700; }

/* 전투 화면 */
#battle-area {
    flex:1; position:relative; overflow:hidden;
}
#battle-bg {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    transition:filter 0.3s;
}
#battle-bg.hit-flash { filter:brightness(1.8) saturate(2); }

/* 스프라이트 */
.sprite {
    position:absolute;
    image-rendering:pixelated;
    transition:transform 0.15s ease-out, filter 0.1s;
}
#pet-sprite {
    width:280px; height:280px;
    bottom:160px; left:80px;
}
#mon-sprite {
    width:240px; height:240px;
    top:100px; right:80px;
    /* 몬스터는 원본 방향 그대로 (이미 왼쪽 바라봄) */
}
#mon-sprite.hit {
    filter:brightness(2) saturate(0) sepia(1) hue-rotate(300deg);
    animation:hit-shake 0.3s ease-out;
}
#pet-sprite.attack {
    animation:pet-attack 0.4s ease-out;
}
@keyframes hit-shake {
    0%{transform:translateX(0)} 25%{transform:translateX(15px)}
    50%{transform:translateX(-10px)} 75%{transform:translateX(8px)}
    100%{transform:translateX(0)}
}
@keyframes pet-attack {
    0%{transform:translateX(0)} 30%{transform:translateX(60px)}
    60%{transform:translateX(40px)} 100%{transform:translateX(0)}
}
@keyframes mon-attack {
    0%{transform:translateX(0)} 30%{transform:translateX(-60px)}
    60%{transform:translateX(-40px)} 100%{transform:translateX(0)}
}
#mon-sprite.mon-attack { animation:mon-attack 0.4s ease-out; }

/* 이펙트 레이어 */
#effect-layer {
    position:absolute; inset:0; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
}
.effect-text {
    font-size:42px; font-weight:900; text-shadow:0 0 20px currentColor;
    animation:effect-rise 0.8s ease-out forwards;
    position:absolute;
}
@keyframes effect-rise {
    0%{opacity:1;transform:translateY(0) scale(1.2)} 100%{opacity:0;transform:translateY(-80px) scale(0.8)}
}
.dmg-number {
    position:absolute; font-size:38px; font-weight:900;
    text-shadow:2px 2px 0 #000, 0 0 20px currentColor;
    animation:dmg-float 0.9s ease-out forwards;
    pointer-events:none;
}
@keyframes dmg-float {
    0%{opacity:1;transform:translateY(0) scale(1.3)} 100%{opacity:0;transform:translateY(-60px) scale(0.9)}
}

/* HP/MP 바 — 펫 */
#pet-ui {
    position:absolute; bottom:10px; left:40px;
    width:420px; background:rgba(0,0,0,0.75);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:8px; padding:10px 12px;
}
#pet-ui .pet-name { font-size:15px; font-weight:bold; color:#90FF90; margin-bottom:6px; }
.bar-wrap { margin:4px 0; }
.bar-label { font-size:11px; color:#aaa; margin-bottom:2px; }
.bar-bg { background:#1a1a1a; border-radius:4px; height:16px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease-out; }
.bar-text { position:absolute; left:6px; top:0; height:100%; display:flex; align-items:center; font-size:11px; color:#fff; font-weight:bold; }
.hp-fill { background:linear-gradient(90deg,#22c55e,#4ade80); }
.hp-fill.low { background:linear-gradient(90deg,#dc2626,#ef4444); }
.hp-fill.mid { background:linear-gradient(90deg,#ca8a04,#eab308); }
.mp-fill { background:linear-gradient(90deg,#2563eb,#60a5fa); }
.def-fill { background:linear-gradient(90deg,#1d4ed8,#93c5fd); }
/* ULT 게이지 */
#ult-gauge { display:flex; gap:3px; margin-top:6px; }
.ult-slot {
    flex:1; height:12px; border-radius:3px;
    background:#1a1a1a; border:1px solid #666;
    transition:background 0.3s;
}
.ult-slot.filled { background:linear-gradient(90deg,#fbbf24,#f59e0b); box-shadow:0 0 6px #fbbf24; }

/* HP 바 — 몬스터 */
#mon-ui {
    position:absolute; top:55px; right:20px;
    width:440px; background:rgba(0,0,0,0.75);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:8px; padding:10px 12px;
}
#mon-ui .mon-name { font-size:15px; font-weight:bold; color:#FF7070; margin-bottom:6px; }

/* 스킬 버튼 영역 */
#skill-area {
    height:160px; flex-shrink:0;
    background:rgba(0,0,0,0.85);
    border-top:1px solid rgba(255,200,50,0.2);
    display:flex; flex-direction:column; gap:0;
}
#skill-row1, #skill-row2 {
    flex:1; display:flex; gap:6px; padding:6px 10px 3px;
}
.skill-btn {
    flex:1; border:none; border-radius:8px; cursor:pointer;
    font-size:13px; font-weight:bold; color:#fff;
    padding:0 8px; transition:all 0.15s;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; position:relative; overflow:hidden;
}
.skill-btn:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.2); }
.skill-btn:active:not(:disabled) { transform:translateY(1px); }
.skill-btn:disabled { opacity:0.4; cursor:not-allowed; }
.skill-btn .btn-name { font-size:13px; }
.skill-btn .btn-cost { font-size:10px; opacity:0.8; }
.btn-atk   { background:linear-gradient(135deg,#7f1d1d,#dc2626); }
.btn-atk2  { background:linear-gradient(135deg,#1e3a8a,#2563eb); }
.btn-def   { background:linear-gradient(135deg,#374151,#6b7280); }
.btn-opp   { background:linear-gradient(135deg,#14532d,#16a34a); }
.btn-ult   { background:linear-gradient(135deg,#713f12,#d97706); box-shadow:0 0 12px #f59e0b; }
.btn-parry { background:linear-gradient(135deg,#7c2d12,#ea580c); animation:parry-pulse 0.6s infinite alternate; }
@keyframes parry-pulse { from{box-shadow:0 0 6px #ea580c} to{box-shadow:0 0 20px #ea580c, 0 0 40px #f97316} }
.btn-give  { background:linear-gradient(135deg,#1c1c1c,#374151); }
.btn-swap  { background:linear-gradient(135deg,#1e1b4b,#4338ca); }
.btn-pot   { background:linear-gradient(135deg,#14532d,#15803d); }

/* 전투 로그 */
#battle-log {
    position:absolute; bottom:170px; left:50%;
    transform:translateX(-50%);
    max-width:600px; width:90%;
    text-align:center; pointer-events:none;
}
.log-line {
    font-size:18px; font-weight:bold;
    text-shadow:1px 1px 0 #000, 0 0 10px rgba(255,255,255,0.3);
    animation:log-fade 2.5s ease-out forwards;
    display:block;
}
@keyframes log-fade { 0%{opacity:1;transform:scale(1.1)} 70%{opacity:1} 100%{opacity:0;transform:scale(0.95)} }

/* 모달 (포션/교체 선택) */
#modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.7); z-index:100;
    align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal-box {
    background:#1a1a2e; border:1px solid rgba(255,200,50,0.4);
    border-radius:12px; padding:20px; min-width:300px;
    max-width:90vw;
}
#modal-box h3 { color:#FFD700; margin-bottom:12px; font-size:16px; }
.modal-btn {
    display:block; width:100%; margin:6px 0;
    padding:10px 16px; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2); border-radius:8px;
    color:#fff; cursor:pointer; font-size:14px; text-align:left;
    transition:background 0.15s;
}
.modal-btn:hover { background:rgba(255,255,255,0.2); }
.modal-cancel { background:rgba(255,50,50,0.2); border-color:rgba(255,50,50,0.4); }

/* 결과 화면 */
#result-screen {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:200;
    align-items:center; justify-content:center; flex-direction:column;
    gap:16px;
}
#result-screen.show { display:flex; }
#result-screen h2 { font-size:36px; font-weight:900; }
#result-screen p  { font-size:18px; color:#ccc; }
.result-btn {
    padding:14px 32px; border-radius:10px; border:none;
    font-size:16px; font-weight:bold; cursor:pointer;
    transition:all 0.15s;
}
.result-btn:hover { transform:scale(1.05); }
.btn-continue { background:linear-gradient(135deg,#15803d,#22c55e); color:#fff; }
.btn-end      { background:linear-gradient(135deg,#1d4ed8,#60a5fa); color:#fff; }
</style>
</head>
<body>
<div id="game-container">
    <!-- 상단 HUD -->
    <div id="hud">
        <div class="floor">⚔️ BLACK ARENA TOWER | <span id="floor-num">1</span>층</div>
        <div class="elem-info" id="elem-info">속성 로딩중...</div>
        <div class="resources">
            <span>💰 <span id="bet-display">-</span></span>
            <span>🍃 <span id="silver-display">0</span></span>
            <span>🌟 <span id="gold-display">0</span></span>
            <span>승리 <span id="wins-display">0</span>판</span>
        </div>
    </div>

    <!-- 전투 화면 -->
    <div id="battle-area">
        <div id="battle-bg"></div>

        <!-- 스프라이트 -->
        <img id="pet-sprite"  class="sprite" src="" alt="펫" onerror="this.style.display='none'">
        <img id="mon-sprite"  class="sprite" src="" alt="몬스터" onerror="this.style.display='none'">

        <!-- 이펙트 -->
        <div id="effect-layer"></div>

        <!-- 로그 -->
        <div id="battle-log"></div>

        <!-- 몬스터 UI -->
        <div id="mon-ui">
            <div class="mon-name" id="mon-name">몬스터</div>
            <div class="bar-wrap">
                <div class="bar-bg">
                    <div class="bar-fill hp-fill" id="mon-hp-bar" style="width:100%"></div>
                    <div class="bar-text" id="mon-hp-text">HP -/-</div>
                </div>
            </div>
            <div class="bar-wrap" style="margin-top:4px">
                <div class="bar-bg" style="height:12px">
                    <div class="bar-fill def-fill" id="mon-def-bar" style="width:30%"></div>
                    <div class="bar-text" id="mon-def-text" style="font-size:10px">DEF -</div>
                </div>
            </div>
        </div>

        <!-- 펫 UI -->
        <div id="pet-ui">
            <div class="pet-name" id="pet-name">펫</div>
            <div class="bar-wrap">
                <div class="bar-bg">
                    <div class="bar-fill hp-fill" id="pet-hp-bar" style="width:100%"></div>
                    <div class="bar-text" id="pet-hp-text">HP -/-</div>
                </div>
            </div>
            <div class="bar-wrap">
                <div class="bar-bg" style="height:12px">
                    <div class="bar-fill def-fill" id="pet-def-bar" style="width:30%"></div>
                    <div class="bar-text" id="pet-def-text" style="font-size:10px">DEF -</div>
                </div>
            </div>
            <div class="bar-wrap">
                <div class="bar-bg" style="height:12px">
                    <div class="bar-fill mp-fill" id="pet-mp-bar" style="width:100%"></div>
                    <div class="bar-text" id="pet-mp-text" style="font-size:10px">MP -/-</div>
                </div>
            </div>
            <div id="ult-gauge">
                <div class="ult-slot" id="ult-0"></div>
                <div class="ult-slot" id="ult-1"></div>
                <div class="ult-slot" id="ult-2"></div>
                <div class="ult-slot" id="ult-3"></div>
                <div class="ult-slot" id="ult-4"></div>
                <div class="ult-slot" id="ult-5"></div>
                <div class="ult-slot" id="ult-6"></div>
            </div>
        </div>
    </div>

    <!-- 스킬 버튼 영역 -->
    <div id="skill-area">
        <div id="skill-row1">
            <button class="skill-btn btn-atk"  id="btn-skill1" onclick="doAction('skill1')">
                <span class="btn-name">⚔️ 로딩중</span>
                <span class="btn-cost">-MP</span>
            </button>
            <button class="skill-btn btn-atk2" id="btn-skill2" onclick="doAction('skill2')">
                <span class="btn-name">💥 로딩중</span>
                <span class="btn-cost">-MP</span>
            </button>
            <button class="skill-btn btn-def"  id="btn-defend"  onclick="doAction('defend')">
                <span class="btn-name">🛡️ 방어</span>
                <span class="btn-cost">피해-35%</span>
            </button>
            <button class="skill-btn btn-opp"  id="btn-opport"  onclick="doAction('opportunity')">
                <span class="btn-name">⚡ 기회</span>
                <span class="btn-cost">공격+30%</span>
            </button>
        </div>
        <div id="skill-row2">
            <button class="skill-btn btn-ult"   id="btn-ult"    onclick="doAction('ult')"   style="display:none">
                <span class="btn-name">🌟 궁극기</span>
                <span class="btn-cost">ULT</span>
            </button>
            <button class="skill-btn btn-parry" id="btn-parry"  onclick="doAction('parry')" style="display:none">
                <span class="btn-name">⚡ 패링!</span>
                <span class="btn-cost" id="parry-rate">-% 성공</span>
            </button>
            <button class="skill-btn btn-swap"  id="btn-swap"   onclick="openSwap()">
                <span class="btn-name">🔄 교체</span>
                <span class="btn-cost">파티</span>
            </button>
            <button class="skill-btn btn-pot"   id="btn-potion" onclick="openPotion()">
                <span class="btn-name">🧪 포션</span>
                <span class="btn-cost" id="potion-count">0개</span>
            </button>
            <button class="skill-btn btn-give"  id="btn-give"   onclick="doAction('give_up')">
                <span class="btn-name">🏳️ 포기</span>
                <span class="btn-cost"></span>
            </button>
        </div>
    </div>
</div>

<!-- 모달 -->
<div id="modal-overlay">
    <div id="modal-box">
        <h3 id="modal-title">선택</h3>
        <div id="modal-content"></div>
        <button class="modal-btn modal-cancel" onclick="closeModal()">❌ 취소</button>
    </div>
</div>

<!-- 결과 화면 -->
<div id="result-screen">
    <h2 id="result-title">결과</h2>
    <p id="result-desc"></p>
    <div style="display:flex;gap:12px">
        <button class="result-btn btn-continue" id="btn-continue" onclick="continueGame()" style="display:none">▶️ 계속하기</button>
        <button class="result-btn btn-end"      id="btn-end-game" onclick="endGame()">🏆 종료</button>
    </div>
</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────
const API = window.location.origin;
const token = new URLSearchParams(window.location.search).get('token') || 'test';
let gameState = null;
let actionLocked = false;

// ── 이미지 베이스 URL ─────────────────────────────────────────────
const BASE = 'https://raw.githubusercontent.com/siwoo12305-wq/tbh-assets/refs/heads/main';
const ELEM_EFFECT = {
    '불':'fire','물':'ice','번개':'lightning','어둠':'dark','얼음':'ice','풀':'heal','물리':'slash'
};

// ── 게임 초기화 ───────────────────────────────────────────────────
async function initGame() {
    try {
        const r = await fetch(`${API}/api/game/state?token=${token}`);
        if (!r.ok) { showError('게임 세션 없음. 디스코드에서 /블레나 시작 하세요.'); return; }
        gameState = await r.json();
        renderAll();
    } catch(e) {
        // 테스트 모드
        console.log('API 없음, 테스트 모드');
        gameState = getDemoState();
        renderAll();
    }
}

// ── 테스트용 더미 상태 ────────────────────────────────────────────
function getDemoState() {
    return {
        floor:1, wins:0, silver:0, gold:0, bet:10000,
        phase:'battle',
        party:[{
            name:'드래곤', emoji:'🔴', grade:'mythic', element:'불', element_raw:'불',
            level:10, hp:700, max_hp:700, atk:230, def:140,
            cur_mana:130, max_mana:130, ult_gauge:3, alive:true,
            skills:{
                skill1:{name:'드래곤 클로', mana:20, dmg_mult:1.4},
                skill2:{name:'화염 브레스', mana:40, dmg_mult:2.0},
                ult:{name:'용의 분노', mana:0, dmg_mult:3.0},
            },
            skill_cd:{}, buffs:[], debuffs:[],
        }],
        active:0,
        monster:{
            name:'독 안개 슬라임', emoji:'🟢', element:'풀',
            hp:1080, max_hp:1080, atk:315, def:90, spd:50,
            is_boss:false, is_elite:false, level:0,
            pattern:['점액 투척','독 안개'],pattern_idx:0,
            buffs:[], debuffs:[],
        },
        potions:{'HP포션':3},
        parry_available:false,
    };
}

// ── 전체 렌더 ─────────────────────────────────────────────────────
function renderAll() {
    if (!gameState) return;
    const g = gameState;
    const pet = g.party[g.active];
    const mon = g.monster;

    // HUD
    document.getElementById('floor-num').textContent = g.floor;
    document.getElementById('bet-display').textContent = fmtCoin(g.bet);
    document.getElementById('silver-display').textContent = g.silver;
    document.getElementById('gold-display').textContent = g.gold;
    document.getElementById('wins-display').textContent = g.wins;

    // 배경
    const bgMap = {normal:'/normal_field.png', boss:'/Boss_field.png', elite:'/normal_field.png'};
    const bgKey = mon.is_boss ? 'boss' : (mon.is_elite ? 'elite' : 'normal');
    document.getElementById('battle-bg').style.backgroundImage = `url('${BASE}${bgMap[bgKey]}')`;

    // 펫 스프라이트
    const petImg = document.getElementById('pet-sprite');
    petImg.src = getPetUrl(pet.name, 'idle');
    petImg.style.display = 'block';

    // 몬스터 스프라이트
    const monImg = document.getElementById('mon-sprite');
    monImg.src = getMonUrl(mon, 'idle');
    monImg.style.display = 'block';

    // 펫 UI
    document.getElementById('pet-name').textContent = `${pet.emoji} ${pet.name}  Lv.${pet.level}  ${pet.element}`;
    updateBar('pet-hp', pet.hp, pet.max_hp, 'HP');
    updateBar('pet-def', pet.def, 300, 'DEF ' + pet.def, true);
    updateBar('pet-mp', pet.cur_mana, pet.max_mana, 'MP');
    // ULT 슬롯
    for(let i=0;i<7;i++) {
        document.getElementById(`ult-${i}`).className = 'ult-slot' + (i < pet.ult_gauge ? ' filled' : '');
    }

    // 몬스터 UI
    const mtype = mon.is_boss ? '👑 BOSS ' : (mon.is_elite ? '⚠️ ELITE ' : '');
    document.getElementById('mon-name').textContent = `${mon.emoji} ${mtype}${mon.name}  Lv.${mon.level}`;
    updateBar('mon-hp', mon.hp, mon.max_hp, 'HP');
    updateBar('mon-def', mon.def, 200, 'DEF ' + mon.def, true);

    // 속성 상성
    const adv = getElemAdv(pet.element, mon.element);
    document.getElementById('elem-info').textContent = `${pet.element} vs ${mon.element} = ${adv}`;

    // 버튼
    renderButtons();

    // 결과/패배 화면
    if (g.phase === 'result' || g.phase === 'defeat') {
        setTimeout(showResult, 300);
    }
}

function updateBar(id, cur, max, label, isDef=false) {
    const bar = document.getElementById(`${id}-bar`);
    const txt = document.getElementById(`${id}-text`);
    const pct = max > 0 ? Math.max(0, cur/max*100) : 0;
    bar.style.width = pct + '%';
    if (!isDef) {
        bar.className = 'bar-fill hp-fill' + (pct<25?' low':(pct<50?' mid':''));
    }
    txt.textContent = isDef ? label : `${label} ${cur}/${max}`;
}

function renderButtons() {
    const g = gameState;
    if (g.phase !== 'battle') return;
    const pet = g.party[g.active];
    const s1  = pet.skills.skill1;
    const s2  = pet.skills.skill2;

    const b1 = document.getElementById('btn-skill1');
    b1.querySelector('.btn-name').textContent = `⚔️ ${s1.name}`;
    b1.querySelector('.btn-cost').textContent = `${s1.mana}MP`;
    b1.disabled = actionLocked || (pet.skill_cd[s1.name]||0)>0 || pet.cur_mana<s1.mana;

    const b2 = document.getElementById('btn-skill2');
    b2.querySelector('.btn-name').textContent = `💥 ${s2.name}`;
    b2.querySelector('.btn-cost').textContent = `${s2.mana}MP`;
    b2.disabled = actionLocked || (pet.skill_cd[s2.name]||0)>0 || pet.cur_mana<s2.mana;

    document.getElementById('btn-defend').disabled  = actionLocked;
    document.getElementById('btn-opport').disabled  = actionLocked;

    // ULT
    const ultBtn = document.getElementById('btn-ult');
    ultBtn.style.display = pet.ult_gauge >= 7 ? 'flex' : 'none';
    if (pet.skills.ult) ultBtn.querySelector('.btn-name').textContent = `🌟 ${pet.skills.ult.name}`;

    // 패링
    const parryBtn = document.getElementById('btn-parry');
    parryBtn.style.display = g.parry_available ? 'flex' : 'none';
    if (g.parry_available) {
        const rate = calcParryRate(pet, g.monster);
        document.getElementById('parry-rate').textContent = `${rate}% 성공`;
        parryBtn.querySelector('.btn-name').textContent = `⚡ 패링!`;
    }

    // 포션 카운트
    const potTotal = Object.values(g.potions||{}).reduce((a,b)=>a+b,0);
    document.getElementById('potion-count').textContent = `${potTotal}개`;
    document.getElementById('btn-potion').disabled = potTotal === 0 || actionLocked;

    // 교체
    const aliveOthers = g.party.filter((p,i)=>p.alive&&i!==g.active);
    document.getElementById('btn-swap').disabled = aliveOthers.length===0 || actionLocked;
}

// ── 행동 실행 ─────────────────────────────────────────────────────
async function doAction(action) {
    if (actionLocked) return;
    actionLocked = true;
    setAllDisabled(true);

    try {
        // 로컬 애니메이션 먼저
        await playActionAnim(action);

        // API 호출
        const r = await fetch(`${API}/api/game/action`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({token, action})
        });
        if (r.ok) {
            const data = await r.json();
            await processResult(data);
        } else {
            // 테스트 모드 — 로컬 처리
            const result = simulateAction(action);
            await processResult(result);
        }
    } catch(e) {
        console.error(e);
        const result = simulateAction(action);
        await processResult(result);
    }

    actionLocked = false;
    renderButtons();
}

// ── 애니메이션 ────────────────────────────────────────────────────
async function playActionAnim(action) {
    const pet = gameState.party[gameState.active];
    const elem = pet.element;

    // 결과 화면 행동
    if (action === 'continue') {
        document.getElementById('result-screen').classList.remove('show');
        gameState.phase = 'battle';
        gameState.monster = makeTestMon(gameState.floor);
        // 파티 HP 20% 회복
        gameState.party.forEach(p => {
            if (p.alive) {
                p.hp = Math.min(p.max_hp, p.hp + Math.floor(p.max_hp * 0.20));
                p.cur_mana = Math.min(p.max_mana, p.cur_mana + Math.floor(p.max_mana * 0.25));
            }
        });
        renderAll();
        // API에도 전달
        try {
            const r = await fetch(`${API}/api/game/action`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({token, action:'continue'})
            });
            if (r.ok) { const data = await r.json(); if(data.game_state) gameState = data.game_state; renderAll(); }
        } catch(e) { console.log('continue api failed, using local'); }
        actionLocked = false; renderButtons(); return;
    }
    if (action === 'end') {
        // 종료 결과 전송
        try {
            await fetch(`${API}/api/game/result`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({token, result:'end'})
            });
        } catch(e) {}
        document.getElementById('result-screen').innerHTML = `
            <h2 style="color:#FFD700">🏆 게임 종료!</h2>
            <p>${Math.max(0,gameState.floor-1)}층 클리어 | 🍃${gameState.silver} 🌟${gameState.gold}</p>
            <p style="color:#aaa;margin-top:8px">Discord에서 보상을 확인하세요!</p>
        `;
        actionLocked = false; return;
    }
    if (action === 'give_up') {
        if (!confirm('정말 포기하시겠습니까? 배팅금이 몰수됩니다.')) { actionLocked=false; renderButtons(); return; }
        try {
            await fetch(`${API}/api/game/result`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({token, result:'give_up'})
            });
        } catch(e) {}
        document.getElementById('result-screen').classList.add('show');
        document.getElementById('result-title').textContent = '🏳️ 포기';
        document.getElementById('result-title').style.color = '#888';
        document.getElementById('result-desc').textContent = `${Math.max(0,gameState.floor-1)}층에서 포기 | 배팅금 몰수`;
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('btn-end-game').textContent = '🔙 닫기';
        actionLocked = false; return;
    }

    if (['skill1','skill2','ult','secret'].includes(action)) {
        // 1. 펫 공격 모션
        const petImg = document.getElementById('pet-sprite');
        petImg.src = getPetUrl(pet.name, 'attack');
        petImg.classList.add('attack');

        // 이펙트
        showEffect(ELEM_EFFECT[elem] || 'slash', 'pet');
        await sleep(350);

        // 2. 몬스터 피격
        const monImg = document.getElementById('mon-sprite');
        monImg.classList.add('hit');
        document.getElementById('battle-bg').classList.add('hit-flash');
        await sleep(300);
        monImg.classList.remove('hit');
        document.getElementById('battle-bg').classList.remove('hit-flash');

        // 3. 펫 복귀
        petImg.src = getPetUrl(pet.name, 'idle');
        petImg.classList.remove('attack');
    } else if (action === 'parry') {
        showEffectText('⚡ 패링!', '#f97316');
        await sleep(200);
    }
}

async function playMonsterAnim(dmg, isCrit) {
    // 몬스터 공격 모션
    const monImg = document.getElementById('mon-sprite');
    monImg.classList.add('mon-attack');
    showEffectText('👹 공격!', '#ff6060');
    await sleep(350);
    monImg.classList.remove('mon-attack');

    // 펫 피격
    const petImg = document.getElementById('pet-sprite');
    petImg.style.filter = 'brightness(2) saturate(0)';
    showDmgNumber(dmg, false, true); // 펫 위치

    petImg.style.filter = '';
}

function showEffect(type, target) {
    const layer = document.getElementById('effect-layer');
    const el = document.createElement('div');
    el.className = 'effect-text';

    const effects = {
        slash:'⚔️', fire:'🔥', ice:'❄️', lightning:'⚡', dark:'🌑', heal:'💚'
    };
    el.textContent = effects[type] || '✨';
    el.style.color = {fire:'#ff6b00',ice:'#60c8ff',lightning:'#ffe000',dark:'#9b59ff',heal:'#00ff88',slash:'#fff'}[type]||'#fff';

    if (target === 'pet') {
        el.style.left = '200px'; el.style.top = '300px';
    } else {
        el.style.right = '150px'; el.style.top = '180px';
    }

}

function showEffectText(text, color) {
    const layer = document.getElementById('effect-layer');
    const el = document.createElement('div');
    el.className = 'effect-text';
    el.textContent = text;
    el.style.color = color || '#fff';

    layer.appendChild(el);
    setTimeout(() => el.remove(), 900);
}

function showDmgNumber(dmg, isCrit, onPet=false) {
    const layer = document.getElementById('effect-layer');
    const el = document.createElement('div');
    el.className = 'dmg-number';
    el.textContent = (isCrit ? '💥' : '-') + dmg.toLocaleString();

    else       { el.style.right='100px'; el.style.top='80px'; }

    setTimeout(() => el.remove(), 1000);

function showLog(text) {
    const log = document.getElementById('battle-log');
    const el  = document.createElement('span');
    el.className = 'log-line';
    el.textContent = text;
    log.innerHTML = '';
    log.appendChild(el);
}

// ── 결과 처리 ─────────────────────────────────────────────────────
async function processResult(data) {
    if (!data) return;
    gameState = data.game_state || gameState;

    // 로그 표시
    if (data.logs) {
        for (const log of data.logs) {
            showLog(log);
            await sleep(400);
        }
    }

    // 데미지 숫자
    if (data.pet_dmg)  showDmgNumber(data.pet_dmg,  data.pet_crit,  false);
    if (data.mon_dmg)  showDmgNumber(data.mon_dmg,  false,          true);

    // 몬스터 공격 애니메이션
    if (data.mon_dmg) await playMonsterAnim(data.mon_dmg, false);

    renderAll();
}

// ── 로컬 시뮬레이션 (테스트용) ───────────────────────────────────
function simulateAction(action) {
    const g = gameState;
    const pet = g.party[g.active];
    const mon = g.monster;
    const logs = [];
    let pet_dmg = 0, pet_crit = false;

    if (['skill1','skill2','ult'].includes(action)) {
        const skill = pet.skills[action] || pet.skills.skill1;
        const mc = skill.mana || 10;
        pet.cur_mana = Math.max(0, pet.cur_mana - mc);
        const raw_dmg = Math.max(1, Math.floor(pet.atk * skill.dmg_mult) - Math.floor(mon.def/2));
        pet_crit = Math.random() < 0.10;
        pet_dmg = pet_crit ? Math.floor(raw_dmg*1.8) : raw_dmg;
        pet_dmg = Math.floor(pet_dmg * (0.9 + Math.random()*0.2));
        mon.hp = Math.max(0, mon.hp - pet_dmg);
        pet.ult_gauge = Math.min(7, pet.ult_gauge + (skill.ult_gain||1));
        logs.push(`⚔️ ${skill.name} → ${pet_dmg} 피해${pet_crit?' 💥크리!':''}`);
        showDmgNumber(pet_dmg, pet_crit, false);
    } else if (action === 'defend') {
        pet.buffs = pet.buffs || [];
        pet.buffs.push({type:'dmg_reduce',value:0.35,duration:1});
        logs.push('🛡️ 방어 태세! 피해 35% 감소');
    } else if (action === 'opportunity') {
        pet.buffs = pet.buffs || [];
        pet.buffs.push({type:'opportunity',value:0.30,duration:1});
        logs.push('⚡ 기회 포착! 다음 공격 +30%');
    }

    // 몬스터 처치 확인
    if (mon.hp <= 0) {
        g.wins += 1; g.silver += Math.floor(Math.random()*3)+1;
        logs.push(`🏆 ${mon.name} 처치!`);
        if (g.wins >= 3) g.phase = 'result';
        else { g.floor += 1; g.monster = makeTestMon(g.floor); }
        g.parry_available = false;
        return {game_state:game, logs};
    }

    // 몬스터 공격
    if (action !== 'defend' || Math.random() > 0.5) {
        const patterns = mon.pattern || ['기본 공격'];
        const pname = patterns[mon.pattern_idx % patterns.length];
        mon.pattern_idx = (mon.pattern_idx+1) % patterns.length;
        const def_bonus = (pet.buffs||[]).filter(b=>b.type==='dmg_reduce').reduce((s,b)=>s+b.value,0);
        let m_dmg = Math.max(1, Math.floor(mon.atk*(0.85+Math.random()*0.3)) - Math.floor(pet.def/2));
        m_dmg = Math.floor(m_dmg * (1 - Math.min(0.8, def_bonus)));
        pet.hp = Math.max(0, pet.hp - m_dmg);
        logs.push(`👹 ${mon.name}의 ${pname} → ${m_dmg} 피해!`);
        g.parry_available = true;
        g.pending_parry_dmg = m_dmg;
        setTimeout(()=>showDmgNumber(m_dmg, false, true), 500);
    }

    // 버프 턴 감소
    pet.buffs = (pet.buffs||[]).map(b=>({...b,duration:b.duration-1})).filter(b=>b.duration>0);
    pet.cur_mana = Math.min(pet.max_mana, pet.cur_mana + Math.floor(pet.max_mana*0.15));

    return {game_state:game, logs};
}

function makeTestMon(floor) {
    const mult = 1 + (floor-1)*0.06;
    return {
        name:['독 안개 슬라임','붉은 박쥐','철갑 거북','불꽃 도깨비'][Math.floor(Math.random()*4)],
        emoji:'👹', element:['불','물','번개','풀','어둠'][Math.floor(Math.random()*5)],
        hp:Math.floor(120*mult*9), max_hp:Math.floor(120*mult*9),
        atk:Math.floor(35*mult*9), def:Math.floor(10*mult*9),
        spd:50, is_boss:false, is_elite:false, level:Math.floor((floor-1)/10),
        pattern:['기본 공격','강타'], pattern_idx:0, buffs:[], debuffs:[],
    };
}

// ── 모달 (포션/교체) ─────────────────────────────────────────────
function openPotion() {
    const g = gameState;
    const pots = Object.entries(g.potions||{}).filter(([k,v])=>v>0);
    if (!pots.length) return;
    document.getElementById('modal-title').textContent = '🧪 포션 선택';
    const content = document.getElementById('modal-content');
    content.innerHTML = pots.map(([name,qty])=>
        `<button class="modal-btn" onclick="usePotion('${name}')">${name} x${qty}</button>`
    ).join('');
    document.getElementById('modal-overlay').classList.add('show');
}

function usePotion(name) {
    closeModal();
    const g = gameState;
    const pet = g.party[g.active];
    g.potions[name]--;
    let log = '';
    if (name==='HP포션') {
        const h=Math.floor(pet.max_hp*0.30); pet.hp=Math.min(pet.max_hp,pet.hp+h); log=`🧪 HP포션 +${h}`;
    } else if (name==='신비한포션') {
        pet.hp=pet.max_hp; log='✨ 완전 회복!';
    } else if (name==='크리포션') {
        pet.buffs.push({type:'crit_boost',value:1,duration:1}); log='⚗️ 크리 확정!';
    } else if (name==='마력포션') {
        pet.cur_mana=pet.max_mana; log='💙 마나 충전!';
    } else if (name==='방무포션') {
        pet.buffs.push({type:'armor_break_buff',value:1,duration:1}); log='🔴 방무 확정!';
    } else if (name==='명중포션') {
        pet.buffs.push({type:'sure_hit',value:0,duration:1}); log='🎯 명중 확정!';
    }
    showLog(log);
    renderAll();
}

function openSwap() {
    const g = gameState;
    const others = g.party.filter((p,i)=>p.alive&&i!==g.active);
    if (!others.length) return;
    document.getElementById('modal-title').textContent = '🔄 펫 교체';
    const content = document.getElementById('modal-content');
    content.innerHTML = g.party.map((p,i)=>
        p.alive && i!==g.active
        ? `<button class="modal-btn" onclick="swapPet(${i})">${p.emoji} ${p.name} Lv.${p.level}  HP:${p.hp}/${p.max_hp}</button>`
        : ''
    ).join('');
    document.getElementById('modal-overlay').classList.add('show');
}

function swapPet(idx) {
    closeModal();
    gameState.active = idx;
    const pet = gameState.party[idx];
    showLog(`🔄 ${pet.name} 출전!`);
    renderAll();
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
}

function showResult() {
    const g = gameState;
    const screen = document.getElementById('result-screen');
    if (g.phase === 'defeat') {
        document.getElementById('result-title').textContent = '💀 패배';
        document.getElementById('result-title').style.color = '#ff4444';
        document.getElementById('btn-continue').style.display = 'none';
    } else {
        document.getElementById('result-title').textContent = '✅ 승리!';
        document.getElementById('result-title').style.color = '#4ade80';
        document.getElementById('btn-continue').style.display = 'block';
    }
    const floor = g.floor > 1 ? g.floor - 1 : g.floor;
    document.getElementById('result-desc').textContent = `${floor}층 클리어 | 승리 ${g.wins}판 | 🍃${g.silver} 🌟${g.gold}`;
    screen.classList.add('show');
}

function showError(msg) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:20px;color:#ff6060">${msg}</div>`;
}

// ── 유틸 ─────────────────────────────────────────────────────────
function getPetUrl(name, state='idle') {
    // GitHub raw URL — 파일명: 토끼_idle.png 형식
    const encoded = encodeURIComponent(name);
    return `${BASE}/${encoded}_${state}.png`;
}

function getMonUrl(mon, state='idle') {
    const name = mon.name;
    const elem = mon.element || '물리';
    const bosses = {
        '심연의 용':{'idle':'%EC%8B%AC%EC%97%B0%EC%9D%98%20%EC%9A%A9_idle.png','attack':'%EC%8B%AC%EC%97%B0%EC%9D%98%20%EC%9A%A9_attack.png'},
        '황금 심판자':{'idle':'%ED%99%A9%EA%B8%88%20%EC%8B%AC%ED%8C%90%EC%9E%90_idle.png','attack':'%ED%99%A9%EA%B8%88%20%EC%8B%AC%ED%8C%90%EC%9E%90_attack.png'},
        '검은 왕':{'idle':'%EA%B2%80%EC%9D%80%20%EC%99%95_idle.png','attack':'%EA%B2%80%EC%9D%80%20%EC%99%95_attack.png'},
    };
    if (bosses[name]) return `${BASE}/${bosses[name][state]||bosses[name].idle}`;
    if (mon.is_elite) return `${BASE}/${encodeURIComponent(elem)}%20%EB%B3%80%EC%A2%85_idle.png`;
    const idx = (Math.abs(hashCode(name)) % 4) + 1;
    const elemEnc = encodeURIComponent(elem);
    return `${BASE}/${elemEnc}${idx}_idle.png`;
}

function hashCode(str) {
    let h=0;
    for(let i=0;i<str.length;i++) h=Math.imul(31,h)+str.charCodeAt(i)|0;
    return h;
}

function getElemAdv(a, b) {
    const adv = {불:{풀:'🔼유리',얼음:'🔼유리',물:'🔽불리'},물:{불:'🔼유리',번개:'🔼유리'},번개:{물:'🔼유리'},풀:{물:'🔼유리',번개:'🔽불리'},어둠:{},얼음:{풀:'🔼유리'}};
    return (adv[a]&&adv[a][b]) || '➡보통';
}

function calcParryRate(pet, mon) {
    const ps = pet.speed || 60;
    const ms = mon.spd || 50;
    return Math.min(65, Math.floor(ps/(ps+ms)*100));
}

function fmtCoin(n) {
    if (n >= 100000000) return (n/100000000).toFixed(1)+'억';
    if (n >= 10000) return (n/10000).toFixed(0)+'만';
    return n.toLocaleString();
}

function setAllDisabled(v) {
    document.querySelectorAll('.skill-btn').forEach(b=>b.disabled=v);
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function continueGame() {
    // 결과 화면 닫고 다음 층 진행
    document.getElementById('result-screen').classList.remove('show');
    gameState.phase = 'battle';
    // 다음 층 몬스터 생성
    gameState.monster = makeTestMon(gameState.floor);
    // 파티 소량 회복
    gameState.party.forEach(p => {
        if (p.alive) {
            p.hp = Math.min(p.max_hp, p.hp + Math.floor(p.max_hp * 0.20));
            p.cur_mana = Math.min(p.max_mana, p.cur_mana + Math.floor(p.max_mana * 0.25));
        }
    });
    gameState.parry_available = false;
    renderAll();
    showLog(`⚔️ ${gameState.floor}층 도전!`);
}

function endGame() {
    // 종료 처리 — 결과 화면에 보상 표시
    const g = gameState;
    const floor = g.floor > 1 ? g.floor - 1 : g.floor;
    const bet = g.bet || 0;
    const mult = 0.5 + (floor / 30) * 3.0;
    const reward = g.wins >= 3 ? Math.max(Math.floor(bet*0.5), Math.floor(bet*mult)) : 0;

    document.getElementById('result-screen').classList.remove('show');

    // 결과 embed 표시
    const endEmbed = document.createElement('div');
    endEmbed.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    endEmbed.innerHTML = `
        <div style="font-size:48px">🏆</div>
        <h2 style="font-size:32px;color:#FFD700">게임 종료!</h2>
        <p style="font-size:20px;color:#ccc">${floor}층 클리어</p>
        <p style="font-size:18px;color:#4ade80">💰 ${fmtCoin(reward)} 획득!</p>
        <p style="font-size:16px;color:#aaa">🍃${g.silver} &nbsp; 🌟${g.gold} &nbsp; 승리 ${g.wins}판</p>
        <p style="font-size:14px;color:#888;margin-top:8px">Discord 채널에서 보상이 지급됩니다.</p>
        <button onclick="location.reload()" style="margin-top:16px;padding:12px 32px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer">🔄 처음으로</button>
    `;
    document.body.appendChild(endEmbed);

    // Render API에 결과 전송
    fetch('/api/game/result', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({token, result:'end'})
    }).catch(e=>console.log(e));
}

// ── 시작 ─────────────────────────────────────────────────────────
initGame();
</script>
